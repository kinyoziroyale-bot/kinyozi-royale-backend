# =======================================================================
# Production profile overrides.
# Activate with: SPRING_PROFILES_ACTIVE=prod
# =======================================================================

# NEVER let Hibernate mutate the production schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Never surface stack traces to clients.
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.include-exception=false

# --------------------------------------------------------------------
# Cookies are Secure in production. HTTPS is REQUIRED.
# --------------------------------------------------------------------
royale.security.cookie.secure=true
royale.security.cookie.sameSite=${ROYALE_COOKIE_SAMESITE:Lax}

# --------------------------------------------------------------------
# Supabase — production should always require email verification.
# Set SUPABASE_URL, SUPABASE_ANON_KEY as env vars.
# --------------------------------------------------------------------
supabase.email-verification.enabled=${SUPABASE_EMAIL_VERIFY:true}

# =======================================================================
# Developer Portal — additive.
# No insecure default is provided. If ROYALE_ADMIN_JWT_SECRET is missing
# the AdminJwtUtil @PostConstruct guard will refuse to start.
# =======================================================================
royale.admin.jwtSecret=${ROYALE_ADMIN_JWT_SECRET:CHANGE_ME_INSECURE_ADMIN_DEFAULT_MUST_BE_OVERRIDDEN}
royale.admin.jwtExpirationMs=${ROYALE_ADMIN_JWT_EXPIRATION_MS:900000}
royale.admin.bootstrap.username=${ROYALE_ADMIN_USERNAME:}
royale.admin.bootstrap.password=${ROYALE_ADMIN_PASSWORD:}
royale.admin.bootstrap.email=${ROYALE_ADMIN_EMAIL:}
royale.admin.bootstrap.fullName=Platform Administrator
