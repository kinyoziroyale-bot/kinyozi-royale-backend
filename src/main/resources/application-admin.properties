# =======================================================================
# Developer Portal — additive configuration.
#
# NO INSECURE DEFAULTS. All admin secrets MUST be provided via environment
# variables (ROYALE_ADMIN_JWT_SECRET, ROYALE_ADMIN_USERNAME,
# ROYALE_ADMIN_PASSWORD, ROYALE_ADMIN_EMAIL). The AdminJwtUtil
# @PostConstruct guard refuses to start if the JWT secret is blank, and
# PlatformAdminBootstrap silently skips seeding when the password is
# absent — an administrator must then be seeded manually via a secure
# out-of-band channel.
# =======================================================================

royale.admin.jwtSecret=${ROYALE_ADMIN_JWT_SECRET:}
royale.admin.jwtExpirationMs=${ROYALE_ADMIN_JWT_EXPIRATION_MS:86400000}

royale.admin.bootstrap.username=${ROYALE_ADMIN_USERNAME:}
royale.admin.bootstrap.password=${ROYALE_ADMIN_PASSWORD:}
royale.admin.bootstrap.email=${ROYALE_ADMIN_EMAIL:}
royale.admin.bootstrap.fullName=${ROYALE_ADMIN_FULL_NAME:Platform Administrator}
