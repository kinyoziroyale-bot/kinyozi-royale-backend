spring.application.name=kinyozi-royale-backend

# Database — no insecure defaults. Set DB_URL / DB_USER / DB_PASSWORD in env.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/kinyozi}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jpa.open-in-view=false

# Server — port fixed at 8081.
server.port=${PORT:8081}
server.servlet.context-path=/api

# --------------------------------------------------------------------
# JWT — access token. MUST be provided via env; app refuses to start
# with the placeholder. 15 minutes is the recommended lifetime; sessions
# are extended via /auth/refresh (HttpOnly cookie).
# --------------------------------------------------------------------
royale.app.jwtSecret=${JWT_SECRET:}
royale.app.jwtExpirationMs=${JWT_EXPIRATION_MS:900000}

# Refresh token lifetime (days). Rotated on every /auth/refresh.
royale.app.refreshExpirationDays=${REFRESH_EXPIRATION_DAYS:7}

# --------------------------------------------------------------------
# Refresh-cookie flags. In production set:
#   ROYALE_COOKIE_SECURE=true      (site MUST be HTTPS)
#   ROYALE_COOKIE_SAMESITE=Lax     (or None for cross-site + Secure)
#   ROYALE_COOKIE_DOMAIN=api.example.com  (optional; blank = host-bound)
# --------------------------------------------------------------------
royale.security.cookie.secure=${ROYALE_COOKIE_SECURE:false}
royale.security.cookie.sameSite=${ROYALE_COOKIE_SAMESITE:Lax}
royale.security.cookie.path=${ROYALE_COOKIE_PATH:/api/auth}
royale.security.cookie.domain=${ROYALE_COOKIE_DOMAIN:}

# CORS — comma-separated allowed origins.
royale.app.cors=${CORS_ORIGINS:http://localhost:5173,http://localhost:8080,http://localhost:8082}

# Login rate limiting (per email).
royale.security.login.maxAttempts=${LOGIN_MAX_ATTEMPTS:5}
royale.security.login.lockoutMinutes=${LOGIN_LOCKOUT_MINUTES:15}

# =======================================================================
# Developer Portal (admin) — always loaded.
# NO INSECURE DEFAULTS. If ROYALE_ADMIN_PASSWORD is blank or left as the
# CHANGE_ME placeholder, PlatformAdminBootstrap will NOT auto-seed the
# admin account and a startup warning will be logged. Seed the admin
# manually via a secure channel in that case.
# =======================================================================
royale.admin.jwtSecret=${ROYALE_ADMIN_JWT_SECRET:}
royale.admin.jwtExpirationMs=${ROYALE_ADMIN_JWT_EXPIRATION_MS:900000}
royale.admin.bootstrap.username=${ROYALE_ADMIN_USERNAME:Superadmin}
royale.admin.bootstrap.password=${ROYALE_ADMIN_PASSWORD:KinyoziRoyaleAdminSecure2026!}
royale.admin.bootstrap.email=${ROYALE_ADMIN_EMAIL:superadmin@gmail.com}
royale.admin.bootstrap.fullName=Platform Administrator

# Rolling window (in days) for "Recent stock movements" list
inventory.recent-movements.days=30

