# =======================================================================
# Developer Portal (admin) — always loaded.
# NO INSECURE DEFAULTS. If ROYALE_ADMIN_PASSWORD is blank or left as the
# CHANGE_ME placeholder, PlatformAdminBootstrap will NOT auto-seed the
# admin account and a startup warning will be logged. Seed the admin
# manually via a secure channel in that case.
# =======================================================================
royale.admin.jwtSecret=${ROYALE_ADMIN_JWT_SECRET:}
royale.admin.jwtExpirationMs=${ROYALE_ADMIN_JWT_EXPIRATION_MS:900000}
royale.admin.bootstrap.username=${ROYALE_ADMIN_USERNAME:Superadmin}
