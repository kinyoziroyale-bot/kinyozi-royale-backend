royale.admin.bootstrap.email=${ROYALE_ADMIN_EMAIL:superadmin@gmail.com}
royale.admin.bootstrap.fullName=Platform Administrator

# Rolling window (in days) for "Recent stock movements" list
inventory.recent-movements.days=30
